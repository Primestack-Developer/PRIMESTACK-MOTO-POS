# fly.toml app configuration file generated for primestack-moto-pos
# See https://fly.io/docs/reference/configuration/ for info on configuring this file.

app = "primestack-moto-pos"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
