<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16a34a" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PrimePOS" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android / General -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PrimePOS" />
    <meta name="description" content="PrimeStack MOTO Payment Terminal" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <title>PrimeStack MOTO POS</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f0fdf4;
        min-height: 100%;
        min-height: 100dvh;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
      }
      /* Safe area support for notched phones */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove any legacy PrimePOS service worker and cache when loading the app.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(reg => reg.unregister());
        });
      }
      if ('caches' in window) {
        caches.delete('primepos-v1');
      }
    </script>
  </body>
</html>
